<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病院薬学 期末テスト対策</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ニックネーム入力画面 -->
    <div id="start-screen" class="screen">
        <h1>病院薬学 期末テスト対策</h1>
        <p id="user-level">Lv.1</p>
        <p>ニックネームを入力してスタート</p>
        <input type="text" id="username" placeholder="ニックネーム">
        <button id="start-btn">スタート</button>
        <button id="ranking-btn">ランキングを見る</button>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz-screen" class="screen hidden">
        <h2 id="question-number">1 / 10</h2>
        <p id="question-text"></p>

        <div id="choices">
            <button class="choice-btn" data-answer="true">○</button>
            <button class="choice-btn" data-answer="false">×</button>
        </div>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" class="screen hidden">
        <h2>結果</h2>
        <p id="score-text"></p>

        <h3>解説</h3>
        <div id="explanation-list"></div>

        <button id="restart-btn">もう一度</button>
    </div>

    <div id="ranking-screen" class="screen hidden">
    <h1>週間ランキング</h1>
    <p id="ranking-info">読み込み中…</p>
    <div id="ranking-list"></div>

    <button id="back-btn">戻る</button>
</div>

    <script src="script.js"></script>
</body>
</html>
